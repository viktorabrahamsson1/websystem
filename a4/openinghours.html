    />

  <body>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <div class="container">
      <nav class="">
        <ul class="nav nav-pills">
          <li class="nav-item">
            <a href="index.html" class="nav-link active" aria-current="page"
              >Home</a

        </ul>
      </nav>
      <div class="content">
        <div>
          <div>
            <h2>Opening Hours</h2>
          </div>
          <p>Welcome to my shop. We are open the following hours:</p>
          <ul class="list-group">
            <li class="list-group-item" id="d1">Mondays: 08.00-16.00</li>
            <li class="list-group-item" id="d2">Tuesdays: 08.00-16.00</li>
            <li class="list-group-item" id="d3">Wednesdays: 08.00-16.00</li>
            <li class="list-group-item" id="d4">Thursdays: 08.00-16.00</li>
            <li class="list-group-item" id="d5">Fridays: 08.00-14.00</li>
            <li class="list-group-item" id="d6">Saturdays: Closed</li>
            <li class="list-group-item" id="d7">Sundays: Closed</li>
          </ul>
        </div>
      </div>
    </div>

    <script type="text/javascript">
      // ------------- STORED CLOSED HOLIDAYS -------------
      const closedDates = ["2025-12-24", "2025-12-25", "2025-01-01"];

      // Get today's date (yyyy-mm-dd)
      const today = new Date();
      const formattedToday = today.toISOString().slice(0, 10);

      // Check if date is closed
      const isHoliday = closedDates.includes(formattedToday);

      // Extract weekday (0=Sun, 1=Mon ...)
      const weekDayNr = today.getDay();

      // ------------- UI REFERENCES -------------
      const notice = document.getElementById("notice");

      // ------------- CASE 1 — HOLIDAY CLOSED -------------
      if (isHoliday) {
        notice.textContent = "The store is closed today (holiday)";
      } else {
        // ------------- WEEKDAY HIGHLIGHTING -------------
        const liToHighlight = document.getElementById("d" + weekDayNr);
        if (liToHighlight) {
          liToHighlight.classList.add("active");
        }

        // ------------- TIME CHECK -------------
        const currentHour = today.getHours();
        const currentMinute = today.getMinutes();
        const totalMinutes = currentHour * 60 + currentMinute;

        let open = false;
        let closeTime = 0;

        if (weekDayNr >= 1 && weekDayNr <= 4) {
          // Mon–Thu
          open = totalMinutes >= 8 * 60 && totalMinutes < 16 * 60;
          closeTime = 16;
        } else if (weekDayNr === 5) {
          // Friday
          open = totalMinutes >= 8 * 60 && totalMinutes < 14 * 60;
          closeTime = 14;
        }

        if (!open && weekDayNr !== 0 && weekDayNr !== 6) {
          notice.textContent = `Store is open today but currently closed (opens 08:00 – ${closeTime}:00).`;
        }
      }
    </script>
  </body>
</html>
